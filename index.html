<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RoboEyes">
  <meta name="theme-color" content="#000000">
  <title>RoboEyes</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="pager">

    <!-- PAGE 0 — Clock (revealed by swiping right) -->
    <section class="page" id="clock-page">
      <div class="clock">
        <div class="clock-time">
          <span id="cl-h">00</span><span class="colon">:</span><span id="cl-m">00</span><span class="clock-sec" id="cl-s">00</span>
        </div>
        <div class="clock-date" id="cl-date">—</div>
        <div class="clock-zone">BANGKOK &middot; GMT+7</div>
      </div>
    </section>

    <!-- PAGE 1 — Eyes (default, center) -->
    <section class="page">
      <div id="scene">
        <div id="face">
        <div id="eyes">

          <div class="eye" id="eye-left">
            <div class="eye-inner">
              <div class="eye-glow"></div>
              <div class="eye-mask">
                <div class="eye-body"></div>
                <div class="lid-top"></div>
                <div class="lid-bottom"></div>
              </div>
            </div>
          </div>

          <div class="eye" id="eye-right">
            <div class="eye-inner">
              <div class="eye-glow"></div>
              <div class="eye-mask">
                <div class="eye-body"></div>
                <div class="lid-top"></div>
                <div class="lid-bottom"></div>
              </div>
            </div>
          </div>

        </div>

        <!-- Alternate NOVA renderer. The original #eyes DOM remains untouched. -->
        <svg id="nova-eyes" data-expression="neutral" viewBox="0 0 800 300" preserveAspectRatio="none" role="img" aria-labelledby="nova-eyes-title nova-eyes-desc">
          <title id="nova-eyes-title">NOVA animated robot eyes</title>
          <desc id="nova-eyes-desc">Two gradient robot eyes cycling through eight expressive animations.</desc>
          <defs>
            <linearGradient id="nova-eye-gradient" x1="0" y1="0" x2="1" y2="1">
              <stop class="nova-gradient-light" offset="0" />
              <stop class="nova-gradient-mid" offset="0.38" />
              <stop class="nova-gradient-dark" offset="1" />
            </linearGradient>
          </defs>

          <g class="nova-eye-motion" id="nova-eye-left-motion">
            <g class="nova-eye-blink" id="nova-eye-left-blink">
              <g class="nova-eye-settle">
                <g class="nova-eye-expression nova-eye-left-expression">
                  <g class="nova-eye-visual nova-eye-normal">
                    <rect class="nova-eye-shape" x="82" y="70" width="248" height="160" rx="68" />
                  </g>
                  <path class="nova-eye-visual nova-eye-smile" d="M88 130 Q206 268 324 130 Q314 252 206 258 Q98 252 88 130Z" />
                  <path class="nova-eye-visual nova-eye-heart" d="M206 244 C179 210 106 178 106 116 C106 69 170 52 206 99 C242 52 306 69 306 116 C306 178 233 210 206 244Z" />
                  <g class="nova-eye-visual nova-eye-cross">
                    <path d="M118 91 L294 221 M294 91 L118 221" />
                  </g>
                </g>
              </g>
            </g>
          </g>

          <g class="nova-eye-motion" id="nova-eye-right-motion">
            <g class="nova-eye-blink" id="nova-eye-right-blink">
              <g class="nova-eye-settle">
                <g class="nova-eye-expression nova-eye-right-expression">
                  <g class="nova-eye-visual nova-eye-normal">
                    <rect class="nova-eye-shape" x="470" y="70" width="248" height="160" rx="68" />
                  </g>
                  <path class="nova-eye-visual nova-eye-smile" d="M476 130 Q594 268 712 130 Q702 252 594 258 Q486 252 476 130Z" />
                  <path class="nova-eye-visual nova-eye-heart" d="M594 244 C567 210 494 178 494 116 C494 69 558 52 594 99 C630 52 694 69 694 116 C694 178 621 210 594 244Z" />
                  <g class="nova-eye-visual nova-eye-cross">
                    <path d="M506 91 L682 221 M682 91 L506 221" />
                  </g>
                </g>
              </g>
            </g>
          </g>

          <g class="nova-glitch-bars" aria-hidden="true">
            <rect x="54" y="72" width="692" height="7" />
            <rect x="108" y="184" width="586" height="11" />
            <rect x="260" y="246" width="332" height="5" />
          </g>
        </svg>
        </div>
      </div>
    </section>

    <!-- PAGE 2 — Music (revealed by swiping left) -->
    <section class="page" id="music-page">
      <div class="music">
        <div class="viz" id="viz"></div>
        <div class="music-title" id="mtitle">No track loaded</div>
        <div class="music-controls">
          <button id="m-load">LOAD</button>
          <button id="m-play" disabled>&#9654;</button>
        </div>
        <input type="file" id="m-file" accept="audio/*" hidden>
        <div class="music-hint">&larr; eyes dance on the next screen</div>
      </div>
    </section>

  </div>

  <div id="dots">
    <span class="dot" data-i="0"></span>
    <span class="dot on" data-i="1"></span>
    <span class="dot" data-i="2"></span>
  </div>

  <button id="mute" aria-label="Toggle sound"></button>

  <div id="eye-style-toggle" role="group" aria-label="Choose eye style">
    <button class="eye-style-option active" type="button" data-eye-style="classic" aria-pressed="true">ORIGINAL</button>
    <button class="eye-style-option" type="button" data-eye-style="nova" aria-pressed="false">NOVA</button>
  </div>

  <button id="palette" aria-label="Change color">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="13.5" cy="6.5" r="1.4" fill="currentColor" stroke="none"/>
      <circle cx="17.5" cy="10.5" r="1.4" fill="currentColor" stroke="none"/>
      <circle cx="8.5" cy="7.5" r="1.4" fill="currentColor" stroke="none"/>
      <circle cx="6.5" cy="12.5" r="1.4" fill="currentColor" stroke="none"/>
      <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c1.4 0 2.5-1.1 2.5-2.5 0-.6-.2-1.1-.6-1.5-.3-.4-.5-.8-.5-1.4 0-1.1.9-2 2-2H17c2.8 0 5-2.2 5-5 0-4.4-4.5-8-10-8z"/>
    </svg>
  </button>
  <div id="swatches">
    <button class="sw" style="--c:#ffffff" data-col="#ffffff" data-glow="255,255,255"></button>
    <button class="sw" style="--c:#00e5ff" data-col="#00e5ff" data-glow="0,229,255"></button>
    <button class="sw" style="--c:#3b82f6" data-col="#3b82f6" data-glow="59,130,246"></button>
    <button class="sw" style="--c:#2bff88" data-col="#2bff88" data-glow="43,255,136"></button>
    <button class="sw" style="--c:#ffe600" data-col="#ffe600" data-glow="255,230,0"></button>
    <button class="sw" style="--c:#ff9500" data-col="#ff9500" data-glow="255,149,0"></button>
    <button class="sw" style="--c:#ff3ba7" data-col="#ff3ba7" data-glow="255,59,167"></button>
    <button class="sw" style="--c:#b15cff" data-col="#b15cff" data-glow="177,92,255"></button>
  </div>

  <div id="portrait-msg">
    <span>&#8635;</span>
    <p>Rotate to landscape</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
